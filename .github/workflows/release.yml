name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: flowprep
          - os: macos-13
            target: x86_64-apple-darwin
            binary: flowprep
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: flowprep
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: flowprep.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME//\//-}"
          archive="flowprep-${version}-${{ matrix.target }}"
          mkdir -p "dist" "${archive}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${archive}/"
          cp README.md LICENSE "${archive}/"

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            pwsh -NoLogo -NoProfile -Command "Compress-Archive -Path '${archive}' -DestinationPath 'dist/${archive}.zip' -Force"
          else
            tar -czf "dist/${archive}.tar.gz" "${archive}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowprep-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: Publish GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  crates-io:
    name: Publish crates.io
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
